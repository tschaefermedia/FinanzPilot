name: Build & Publish Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/finanzpilot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          {
            echo 'body<<CHANGELOG_EOF'

            # Features
            FEATURES=$(git log "$RANGE" --pretty=format:'- %s' --grep='^[Aa]dd\|^[Ff]eat\|^[Nn]ew\|^[Ss]hip\|^[Ii]mplement')
            if [ -n "$FEATURES" ]; then
              echo '### Features'
              echo "$FEATURES"
              echo ''
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:'- %s' --grep='^[Ff]ix\|^[Bb]ug\|^[Pp]atch\|^[Rr]esolve')
            if [ -n "$FIXES" ]; then
              echo '### Fixes'
              echo "$FIXES"
              echo ''
            fi

            # Other changes
            OTHER=$(git log "$RANGE" --pretty=format:'%s' | grep -iv '^add\|^feat\|^new\|^ship\|^implement\|^fix\|^bug\|^patch\|^resolve' | sed 's/^/- /')
            if [ -n "$OTHER" ]; then
              echo '### Other Changes'
              echo "$OTHER"
              echo ''
            fi

            echo '### Docker'
            echo '```bash'
            echo 'docker pull ghcr.io/tschaefermedia/finanzpilot:${{ github.ref_name }}'
            echo '```'

            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
